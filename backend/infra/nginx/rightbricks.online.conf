# /etc/nginx/sites-available/rightbricks.online

server {
    listen 80;
    listen [::]:80;
    server_name www.rightbricks.online;
    return 301 https://rightbricks.online$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name rightbricks.online;
    return 301 https://rightbricks.online$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.rightbricks.online;

    ssl_certificate /etc/letsencrypt/live/rightbricks.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rightbricks.online/privkey.pem;

    return 301 https://rightbricks.online$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rightbricks.online;

    ssl_certificate /etc/letsencrypt/live/rightbricks.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rightbricks.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /robots.txt {
        proxy_pass http://127.0.0.1:3000;
        expires 10m;
        add_header Cache-Control "public, max-age=600";
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3000;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    access_log /var/log/nginx/rightbricks.access.log;
    error_log /var/log/nginx/rightbricks.error.log warn;
}
